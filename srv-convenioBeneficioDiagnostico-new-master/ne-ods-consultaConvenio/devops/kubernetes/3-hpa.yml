apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: #{var-hpa}#
  namespace: #{var-namespace}#
  labels:
    app: #{var-hpa}#
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: #{var-deployment}#
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50