  /diagnosticos/beneficios:
    post:
      tags:
        - Diagnósticos
      summary: Consulta diagnósticos-beneficios
      description: |
        Listado de relaciones diagnóstico-beneficio con datos de diagnóstico y beneficio. LEFT JOIN a Mae_Beneficio (datos beneficio pueden ser NULL), INNER JOIN a Mae_Diagnostico.

        **Filtros (al menos uno requerido):** codSistemaDiagnosticoBeneficio, codDiagnostico (array), codBeneficio, estDiagnosticoBeneficio

        **Paginación keyset:** pagination.limit (1-1000, por defecto 1000), pagination.cursor (nextCursor/previousCursor de la respuesta anterior).
