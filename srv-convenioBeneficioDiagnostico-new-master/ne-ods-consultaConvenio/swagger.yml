                      pageSize: 10
                      hasNextPage: false
                      hasPreviousPage: false
                    cursors:
                      nextCursor: null
                      previousCursor: null
        '400':
          description: Solicitud inválida
          content:
            application/json:
              examples:
                sinFiltros:
                  summary: Sin filtros (Error 400)
                  value:
                    codigo: 'F_NEG_001'
                    mensaje: 'Request incorrecto'
                    descripcion: 'El request enviado no corresponde al especificado en el OpenAPI'
                    detalle:
                      - campo: filters
                        error: "El campo 'filters' es requerido"
                      - campo: filters
                        error: 'Debe proporcionar al menos un filtro: codSistemaDiagnosticoBeneficio, codDiagnostico, codBeneficio o estDiagnosticoBeneficio. Pagination (limit, cursor) no cuenta como filtro.'
                cursorInvalido:
                  summary: Cursor inválido (Error 400)
                  value:
                    codigo: 'F_NEG_001'
                    mensaje: 'Request incorrecto'
                    descripcion: 'El request enviado no corresponde al especificado en el OpenAPI'
                    detalle:
                      - campo: cursor
                        error: 'El cursor proporcionado no es válido o ha sido modificado'
        '500':
          description: Error interno del servidor

components:
  securitySchemes:
    api_key:
      type: apiKey
      name: ocp-apim-subscription-key
      in: header
      description: API Key para autenticación

  parameters:
    X-Correlation-Id:
      name: x-correlation-id
      in: header
      required: true
      description: Identificador único de la transacción (UUID v4)
      schema:
        type: string
        format: uuid
    X-Request-Id:
      name: x-request-id
      in: header
      required: true
      description: Identificador único de la petición (UUID v4)
      schema:
        type: string
        format: uuid
    Nombre-Aplicacion:
      name: nombreaplicacion
      in: header
      required: true
      description: Nombre de la aplicación que realiza la petición
      schema:
        type: string
    Proceso-Negocio:
      name: procesonegocio
      in: header
      required: true
      description: Proceso de negocio asociado a la petición
      schema:
        type: string
    Usuario-Aplicacion:
      name: usuarioaplicacion
      in: header
      required: true
      description: Usuario de la aplicación que realiza la petición
      schema:
        type: string

  schemas:
    BenefitFilters:
      type: object
      description: Filtros de consulta de beneficios. Al menos uno requerido (codCompania, codSistema, codTipoCobertura, codSubtipoCobertura o estRegistro); si se definen no deben estar vacíos.
      properties:
        codCompania:
          type: string
          description: Código de compañía (codCompania)
          maxLength: 5
          example: '20002'
        codSistema:
          type: string
          description: Código de sistema (codSistema)
          maxLength: 5
          example: 'NS'
        codTipoCobertura:
          type: string
          description: Código tipo de cobertura (codTipoCobertura)
          maxLength: 60
          example: '4'
        codSubtipoCobertura:
          type: string
          description: Código subtipo de cobertura (codSubtipoCobertura)
          maxLength: 4
          example: '100'
        estRegistro:
          type: string
          description: Estado de registro (estRegistro)
          maxLength: 5
          example: 'V'

    BenefitPagination:
      type: object
      description: Paginación keyset para beneficios (limit 1-1000, cursor opcional).
      properties:
        limit:
          type: integer
          description: Registros por página (máximo 1000)
          minimum: 1
          maximum: 1000
          default: 1000
          example: 1000
        cursor:
          type: string
          description: Cursor keyset (nextCursor o previousCursor de la respuesta anterior)
          example: 'eyJ...'

    BenefitSearchRequest:
      type: object
      required:
        - filters
      description: Body para consulta de beneficios (POST /beneficios). Debe proporcionar al menos un filtro (distinto de la paginación). Paginación keyset.
      properties:
        filters:
          $ref: '#/components/schemas/BenefitFilters'
        pagination:
          $ref: '#/components/schemas/BenefitPagination'

    BenefitSummary:
      type: object
      description: DTO de un ítem de beneficio en la respuesta.
      properties:
        codCompania:
          type: string
          nullable: true
          description: Código compañía
          example: '20002'
        codSistema:
          type: string
          nullable: true
          description: Código sistema
          example: 'NS'
        codTipoCobertura:
          type: string
          nullable: true
          description: Código tipo cobertura
          example: '4'
        codSubTipoCobertura:
          type: string
          nullable: true
          description: Código subtipo cobertura
          example: '100'
        codBeneficio:
          type: string
          nullable: true
          description: Código beneficio
        desBeneficio:
          type: string
          nullable: true
          description: Descripción beneficio
        estRegistro:
          type: string
          nullable: true
          description: Estado registro
          example: 'V'

    MetaBenefitSummary:
      type: object
      description: Metadata de paginación keyset.
      properties:
        itemCount:
          type: integer
          description: Elementos en esta página
          example: 10
        pageSize:
          type: integer
          description: Tamaño de página solicitado
          example: 1000
        hasNextPage:
          type: boolean
          description: Hay más páginas siguientes
          example: true
        hasPreviousPage:
          type: boolean
          description: Hay páginas anteriores
          example: false

    CursorsBenefitSummary:
      type: object
      description: Cursores keyset.
      properties:
        nextCursor:
          type: string
          nullable: true
          description: Cursor siguiente
        previousCursor:
          type: string
          nullable: true
          description: Cursor anterior

    BenefitSearchResponse:
      type: object
      description: Respuesta de consulta de beneficios (POST /beneficios) con paginación keyset.
      properties:
        data:
          type: array
          description: Lista de beneficios
          items:
            $ref: '#/components/schemas/BenefitSummary'
        meta:
          $ref: '#/components/schemas/MetaBenefitSummary'
        cursors:
          $ref: '#/components/schemas/CursorsBenefitSummary'

    DiagnosticFilters:
      type: object
      required:
        - codDiagnostico
      description: 'Filtros de consulta de diagnósticos. codDiagnostico: obligatorio (array no vacío, máx. 1000 elementos). estRegistro y codSistema: opcionales; si se definen no deben estar vacíos.'
      properties:
        codDiagnostico:
          type: array
          description: Códigos de diagnóstico (codDiagnostico). Obligatorio, no vacío (máximo 1000 elementos)
          maxItems: 1000
          minItems: 1
          items:
            type: string
          example:
            - 'A001'
            - 'B002'
        estRegistro:
          type: string
          description: Estado de registro (estRegistro)
          maxLength: 5
          example: 'V'
        codSistema:
          type: string
          description: Código de sistema (codSistema)
          maxLength: 5
          example: 'NS'

    DiagnosticPagination:
      type: object
      description: Paginación keyset para diagnósticos (limit 1-1000, cursor opcional).
      properties:
        limit:
          type: integer
          description: Registros por página (máximo 1000)
          minimum: 1
          maximum: 1000
          default: 1000
          example: 1000
        cursor:
          type: string
          description: Cursor keyset (nextCursor o previousCursor de la respuesta anterior)
          example: 'eyJ...'

    DiagnosticSearchRequest:
      type: object
      required:
        - filters
      description: 'Body para consulta de diagnósticos (POST /diagnosticos). Filtros: codDiagnostico obligatorio (array no vacío, max 1000), estRegistro y codSistema opcionales. Paginación keyset.'
      properties:
        filters:
          $ref: '#/components/schemas/DiagnosticFilters'
        pagination:
          $ref: '#/components/schemas/DiagnosticPagination'

    DiagnosticSummary:
      type: object
      description: DTO de un ítem de diagnóstico en la respuesta.
      properties:
        codDiagnostico:
          type: string
          nullable: true
          description: Código diagnóstico
          example: 'A001'
        desDiagnostico:
          type: string
          nullable: true
          description: Descripción diagnóstico
        estRegistro:
          type: string
          nullable: true
          description: Estado registro
          example: 'V'
        codSistema:
          type: string
          nullable: true
          description: Código sistema
          example: 'NS'

    MetaDiagnosticSummary:
      type: object
      description: Metadata de paginación keyset.
      properties:
        itemCount:
          type: integer
          description: Elementos en esta página
          example: 10
        pageSize:
          type: integer
          description: Tamaño de página solicitado
          example: 1000
        hasNextPage:
          type: boolean
          description: Hay más páginas siguientes
          example: true
        hasPreviousPage:
          type: boolean
          description: Hay páginas anteriores
          example: false

    CursorsDiagnosticSummary:
      type: object
      description: Cursores keyset.
      properties:
        nextCursor:
          type: string
          nullable: true
          description: Cursor siguiente
        previousCursor:
          type: string
          nullable: true
          description: Cursor anterior

    DiagnosticSearchResponse:
      type: object
      description: Respuesta de consulta de diagnósticos (POST /diagnosticos) con paginación keyset.
      properties:
        data:
          type: array
          description: Lista de diagnósticos
          items:
            $ref: '#/components/schemas/DiagnosticSummary'
        meta:
          $ref: '#/components/schemas/MetaDiagnosticSummary'
        cursors:
          $ref: '#/components/schemas/CursorsDiagnosticSummary'

    DiagnosticBenefitFilters:
      type: object
      description: "Filtros para consulta diagnósticos-beneficios (Mae_DiagnosticoBeneficio + Mae_Beneficio + Mae_Diagnostico). Al menos uno requerido: codSistemaDiagnosticoBeneficio, codDiagnostico, codBeneficio o estDiagnosticoBeneficio."
      properties:
        codSistemaDiagnosticoBeneficio:
          type: string
          description: Código sistema de la relación diagnóstico-beneficio (codSistema en Mae_DiagnosticoBeneficio)
          maxLength: 5
          example: 'NS'
        codDiagnostico:
          type: array
          description: Códigos de diagnóstico. Si se define no vacío (máx. 1000)
          maxItems: 1000
          minItems: 1
          items:
            type: string
          example:
            - 'A00'
            - 'B01'
        codBeneficio:
          type: string
          description: Código beneficio
          maxLength: 5
          example: '001'
        estDiagnosticoBeneficio:
          type: string
          description: Estado registro de la relación diagnóstico-beneficio (estDiagnosticoBeneficio)
          maxLength: 5
          example: 'V'

    DiagnosticBenefitPagination:
      type: object
      description: Paginación keyset para diagnósticos-beneficios.
      properties:
        limit:
          type: integer
          description: Registros por página (máximo 1000)
          minimum: 1
          maximum: 1000
          default: 1000
          example: 1000
        cursor:
          type: string
          description: Cursor keyset (nextCursor o previousCursor de la respuesta anterior)
          example: 'eyJ...'

    DiagnosticBenefitSearchRequest:
      type: object
      required:
        - filters
      description: Body para POST /diagnosticos/beneficios. Al menos un filtro requerido. Paginación keyset.
      properties:
        filters:
          $ref: '#/components/schemas/DiagnosticBenefitFilters'
        pagination:
          $ref: '#/components/schemas/DiagnosticBenefitPagination'

    DiagnosticBenefitSummary:
      type: object
      description: 'DTO de un ítem diagnóstico-beneficio según spec: relación + datos diagnóstico + datos beneficio.'
      properties:
        codSistemaDiagnosticoBeneficio:
          type: string
          nullable: true
          description: Código sistema relación diagnóstico-beneficio
        estDiagnosticoBeneficio:
          type: string
          nullable: true
          description: Estado registro relación diagnóstico-beneficio
        codSistemaDiagnostico:
          type: string
          nullable: true
          description: Código sistema del diagnóstico
        codDiagnostico:
          type: string
          nullable: true
          description: Código diagnóstico
        desDiagnostico:
          type: string
          nullable: true
          description: Descripción diagnóstico
        estDiagnostico:
          type: string
          nullable: true
          description: Estado diagnóstico
        codSistemaBeneficio:
          type: string
          nullable: true
          description: Código sistema del beneficio
        codBeneficio:
          type: string
          nullable: true
          description: Código beneficio
        desBeneficio:
          type: string
          nullable: true
          description: Descripción beneficio
        estBeneficio:
          type: string
          nullable: true
          description: Estado beneficio

    MetaDiagnosticBenefitSummary:
      type: object
      description: Metadata de paginación keyset.
      properties:
        itemCount:
          type: integer
          description: Elementos en esta página
          example: 10
        pageSize:
          type: integer
          description: Tamaño de página solicitado
          example: 1000
        hasNextPage:
          type: boolean
          description: Hay más páginas siguientes
          example: true
        hasPreviousPage:
          type: boolean
          description: Hay páginas anteriores
          example: false

    CursorsDiagnosticBenefitSummary:
      type: object
      description: Cursores keyset.
      properties:
        nextCursor:
          type: string
          nullable: true
          description: Cursor siguiente
        previousCursor:
          type: string
          nullable: true
          description: Cursor anterior

    DiagnosticBenefitSearchResponse:
      type: object
      description: Respuesta de consulta diagnósticos-beneficios (POST /diagnosticos/beneficios) con paginación keyset.
      properties:
        data:
          type: array
          description: Lista de relaciones diagnóstico-beneficio con datos de diagnóstico y beneficio
          items:
            $ref: '#/components/schemas/DiagnosticBenefitSummary'
        meta:
          $ref: '#/components/schemas/MetaDiagnosticBenefitSummary'
        cursors:
          $ref: '#/components/schemas/CursorsDiagnosticBenefitSummary'
