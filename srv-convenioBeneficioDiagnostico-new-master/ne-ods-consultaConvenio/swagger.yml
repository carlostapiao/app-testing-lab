                    cursors:
                      nextCursor: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IkEwOCIsImRpcmVjdGlvbiI6Im5leHQiLCJ0aW1lc3RhbXAiOjE3NzA4MzMxMTYsImlhdCI6MTc3MDgyOTUxNiwiZXhwIjoxNzcwODMzMTE2fQ.wqFSxM8rN3ie6UWXORxdCoBLQJZ_rruOIFAj0E6Bc3U'
                      previousCursor: null
                paginaSiguiente:
                  summary: Página siguiente con nextCursor
                  value:
                    data:
                      - codCompania: '20002'
