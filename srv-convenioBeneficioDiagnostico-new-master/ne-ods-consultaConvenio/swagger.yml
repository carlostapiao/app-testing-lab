                      hasPreviousPage: true
                    cursors:
                      nextCursor: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IkExOCIsImRpcmVjdGlvbiI6Im5leHQiLCJ0aW1lc3RhbXAiOjE3NzA4MzMxNjR9.example'
