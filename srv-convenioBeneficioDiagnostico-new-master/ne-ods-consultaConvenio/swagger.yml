  /diagnosticos:
    post:
      tags:
        - Diagnósticos
      summary: Consulta de diagnósticos
      description: |
        Listado de diagnósticos con paginación keyset. codDiagnostico obligatorio (array no vacío, máx. 1000 elementos). estRegistro y codSistema opcionales; si se definen no deben estar vacíos.

        **Seguridad:**
        - Sanitización automática de entrada habilitada
        - Validación de formato y estructura de datos

        **Filtros:** codDiagnostico (obligatorio), estRegistro, codSistema (opcionales)

        **Paginación keyset:** pagination.limit (1-1000, por defecto 1000), pagination.cursor (nextCursor/previousCursor de la respuesta anterior).
      operationId: queryDiagnostics
      security:
        - api_key:
            - required
      parameters:
        - $ref: '#/components/parameters/X-Correlation-Id'
        - $ref: '#/components/parameters/X-Request-Id'
        - $ref: '#/components/parameters/Nombre-Aplicacion'
        - $ref: '#/components/parameters/Proceso-Negocio'
        - $ref: '#/components/parameters/Usuario-Aplicacion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosticSearchRequest'
            examples:
              filtrosSoportados:
                summary: Filtros soportados (Alpamayo)
                value:
                  filters:
                    codDiagnostico:
                      - 'A001'
                      - 'B002'
                    estRegistro: 'V'
                    codSistema: 'NS'
                  pagination:
                    limit: 10
              sinFiltros:
