paths:
  /beneficios:
    post:
      tags:
        - Beneficios
      summary: Consulta de beneficios
      description: |
        Listado de beneficios con paginación keyset. **Al menos un filtro requerido** (codCompania, codSistema, codTipoCobertura, codSubtipoCobertura o estRegistro). codSubtipoCobertura se mapea a subtipoCobertura en BD. Si se define un filtro no debe estar vacío.

        **Seguridad:**
        - Sanitización automática de entrada habilitada
        - Validación de formato y estructura de datos

        **Filtros (al menos uno requerido):** codCompania, codSistema, codTipoCobertura, codSubtipoCobertura, estRegistro

        **Paginación keyset:** pagination.limit (1-1000, por defecto 1000), pagination.cursor (nextCursor/previousCursor de la respuesta anterior).
      operationId: queryBenefits
      security:
        - api_key:
            - required
      parameters:
        - $ref: '#/components/parameters/X-Correlation-Id'
        - $ref: '#/components/parameters/X-Request-Id'
        - $ref: '#/components/parameters/Nombre-Aplicacion'
        - $ref: '#/components/parameters/Proceso-Negocio'
        - $ref: '#/components/parameters/Usuario-Aplicacion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BenefitSearchRequest'
            examples:
              filtrosSoportados:
                summary: Filtros soportados (Alpamayo)
                value:
                  filters:
                    codCompania: '20002'
                    codSistema: 'NS'
                    codTipoCobertura: '4'
                    codSubtipoCobertura: '100'
                    estRegistro: 'V'
                  pagination:
                    limit: 10
              sinFiltros:
                summary: Sin filtros (Error 400)
                value:
                  pagination:
                    limit: 10
              cursorInvalido:
                summary: Cursor inválido (Error 400)
                value:
                  filters:
                    codCompania: '20002'
                    codSistema: 'NS'
                  pagination:
                    limit: 10
                    cursor: 'invalid-cursor'
              primeraPagina:
                summary: Primera página sin cursor
                value:
                  filters:
                    codCompania: '20002'
                    codSistema: 'NS'
                  pagination:
                    limit: 10
              paginaSiguiente:
                summary: Página siguiente con nextCursor
                value:
                  filters:
                    codCompania: '20002'
                    codSistema: 'NS'
                  pagination:
                    limit: 10
                    cursor: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IkEwOCIsImRpcmVjdGlvbiI6Im5leHQiLCJ0aW1lc3RhbXAiOjE3NzA4MzMxMTYsImlhdCI6MTc3MDgyOTUxNiwiZXhwIjoxNzcwODMzMTE2fQ.wqFSxM8rN3ie6UWXORxdCoBLQJZ_rruOIFAj0E6Bc3U'
              paginaVacia:
                summary: Página vacía (sin resultados)
                value:
                  filters:
                    codCompania: '99999'
                    codSistema: 'XX'
                  pagination:
                    limit: 10
      responses:
        '200':
          description: Lista de beneficios encontrados
          headers:
            X-Correlation-Id:
              description: Identificador de la transacción
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenefitSearchResponse'
              examples:
                filtrosSoportados:
                  summary: Filtros soportados - respuesta exitosa
                  value:
                    data:
                      - codCompania: '20002'
                        codSistema: 'NS'
                        codTipoCobertura: '4'
                        codSubTipoCobertura: '100'
                        codBeneficio: 'A00'
                        desBeneficio: 'AMBULATORIO'
                        estRegistro: 'V'
                    meta:
                      itemCount: 1
                      pageSize: 10
                      hasNextPage: false
                      hasPreviousPage: false
                    cursors:
                      nextCursor: null
                      previousCursor: null
                primeraPagina:
                  summary: Primera página sin cursor
                  value:
                    data:
                      - codCompania: '20002'
                        codSistema: 'NS'
                        codTipoCobertura: null
                        codSubTipoCobertura: null
                        codBeneficio: '999'
                        desBeneficio: 'BENEFICIO DE PRUEBA'
                        estRegistro: 'V'
